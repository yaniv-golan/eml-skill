name: demo-notebook

on:
  pull_request:
    paths:
      - 'docs/demo.ipynb'
      - 'eml-skill/skills/*/scripts/*.py'
      - 'eml-skill/skills/_shared/eml_core/**/*.py'
      - 'requirements.txt'
  push:
    branches:
      - main
    paths:
      - 'docs/demo.ipynb'
      - 'eml-skill/skills/*/scripts/*.py'
      - 'eml-skill/skills/_shared/eml_core/**/*.py'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  execute-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install jupyter nbconvert

      - name: Re-execute docs/demo.ipynb end-to-end
        run: |
          PYTHONPATH=eml-skill/skills/_shared jupyter nbconvert \
            --to notebook \
            --execute docs/demo.ipynb \
            --output /tmp/executed-demo.ipynb
