name: nightly-sub-minimality

on:
  schedule:
    - cron: '7 4 * * *'
  workflow_dispatch:

jobs:
  sub-minimality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run sub K=11 minimality test
        run: |
          PYTHONPATH=eml-skill/skills/_shared pytest eml-skill/skills/_shared/eml_core/tests/test_minimality.py -q -k sub_minimal_at_k11
